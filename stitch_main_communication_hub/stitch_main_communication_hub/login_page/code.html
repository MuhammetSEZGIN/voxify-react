<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Log in to SesVer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#2b8cee",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
</head>
<body class="font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col items-center justify-center bg-background-light dark:bg-background-dark p-4 group/design-root" style="font-family: 'Inter', sans-serif;">
<div class="flex w-full max-w-md flex-col items-center gap-6 rounded-xl bg-white/5 p-8 shadow-2xl dark:bg-black/20">
<div class="flex items-center gap-2">
<svg class="text-primary" fill="none" height="32" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="32" xmlns="http://www.w3.org/2000/svg">
<path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"></path>
<path d="M8 12h8"></path>
<path d="M12 8v8"></path>
</svg>
<h1 class="text-2xl font-bold text-white">SesVer</h1>
</div>
<div class="w-full text-center">
<h1 class="text-white tracking-tight text-3xl font-bold leading-tight">Log in to your account</h1>
<p class="text-gray-400 mt-2 text-base">Welcome back! Please enter your details.</p>
</div>
<div class="w-full flex flex-col gap-4">
<label class="flex flex-col w-full">
<p class="text-gray-200 text-sm font-medium leading-normal pb-2">Username or Email</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary border-transparent bg-[#283039] h-12 placeholder:text-gray-500 p-3 text-base font-normal leading-normal" placeholder="Enter your username or email" value=""/>
</label>
<div class="flex flex-col w-full">
<div class="flex items-center justify-between pb-2">
<p class="text-gray-200 text-sm font-medium leading-normal">Password</p>
<a class="text-primary text-sm font-medium leading-normal hover:underline" href="#">Forgot Password?</a>
</div>
<div class="flex w-full flex-1 items-stretch rounded-lg bg-[#283039] focus-within:ring-2 focus-within:ring-primary">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-l-lg text-white focus:outline-0 focus:ring-0 border-none bg-transparent h-12 placeholder:text-gray-500 p-3 pr-2 text-base font-normal leading-normal" placeholder="Enter your password" type="password" value=""/>
<button aria-label="Toggle password visibility" class="text-gray-400 flex items-center justify-center pr-3">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<div class="pt-2">
<button class="flex min-w-[84px] w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] hover:bg-primary/90 transition-colors">
<span class="truncate">Log In</span>
</button>
</div>
</div>
<div class="text-center">
<p class="text-gray-400 text-sm">
          Don't have an account? <a class="font-semibold text-primary hover:underline" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</body></html>
