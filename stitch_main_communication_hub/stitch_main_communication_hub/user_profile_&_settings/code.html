<!DOCTYPE html>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>

            "text-light-secondary": "#64748B",
            "text-dark-primary": "#E2E8F0",
            "text-dark-secondary": "#94A3B8",
            "border-light": "#E2E8F0",
            "border-dark": "#334155",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings:
      'FILL' 0,
      'wght' 400,
      'GRAD' 0,
      'opsz' 24

</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="flex min-h-screen w-full">
<!-- SideNavBar -->
<aside class="flex w-64 flex-col bg-panel-light dark:bg-panel-dark p-4 border-r border-border-light dark:border-border-dark">
<div class="flex items-center gap-3 p-2 mb-6">
<div class="bg-primary rounded-lg size-8 flex items-center justify-center text-white font-bold text-lg">S</div>
<h1 class="text-text-light-primary dark:text-text-dark-primary text-xl font-bold leading-normal">SesVer</h1>
</div>
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-1">
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-text-light-secondary dark:text-text-dark-secondary hover:bg-primary/10 hover:text-primary dark:hover:text-primary" href="#">
<span class="material-symbols-outlined text-2xl">account_circle</span>
<p class="text-sm font-medium leading-normal">Account</p>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg bg-primary/10 text-primary dark:text-primary" href="#">

<p class="text-sm font-medium leading-normal">Profile</p>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-text-light-secondary dark:text-text-dark-secondary hover:bg-primary/10 hover:text-primary dark:hover:text-primary" href="#">
<span class="material-symbols-outlined text-2xl">shield</span>
<p class="text-sm font-medium leading-normal">Privacy &amp; Security</p>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-text-light-secondary dark:text-text-dark-secondary hover:bg-primary/10 hover:text-primary dark:hover:text-primary" href="#">
<span class="material-symbols-outlined text-2xl">notifications</span>
<p class="text-sm font-medium leading-normal">Notifications</p>
</a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-text-light-secondary dark:text-text-dark-secondary hover:bg-primary/10 hover:text-primary dark:hover:text-primary" href="#">
<span class="material-symbols-outlined text-2xl">palette</span>
<p class="text-sm font-medium leading-normal">Appearance</p>
</a>
</div>
</div>
<div class="mt-auto flex flex-col gap-4">
<div class="border-t border-border-light dark:border-border-dark pt-4">
<div class="flex gap-3 items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full size-10" data-alt="User avatar with abstract background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBdoqR2jBi-PQtC6oEsV21SHXqRUYTfuUjbc1KviaScKEyFf7pDh3MdWvGKZHS1lF_4OJch-_50cU0_q3MCd3KE3M3sLDlOTcMHwFagnbIIGqkC5xNuWPcrprzDo9oaux9xAf6kcn6uUFO5lHUT9c6eCpd70GvSOBiv2MU39MFoIJCLQh28WUyBQXXtaupMASqoLFf2miCliG0EHAE7P-kjVEEc746QvzwwUatBacOtMfo8Oj65sOXqAmtVerA52U3SHiwPv9BCiAI");'></div>
<div class="flex flex-col">
<h2 class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal">Eleanor Vance</h2>
<p class="text-text-light-secondary dark:text-text-dark-secondary text-xs font-normal leading-normal">eleanor.v@sesver.com</p>
</div>
</div>
</div>
</div>
</aside>
<!-- Main Content Area -->
<main class="flex-1 p-8 overflow-y-auto">
<div class="max-w-4xl mx-auto">
<!-- Breadcrumbs -->
<div class="flex flex-wrap gap-2 mb-4">
<a class="text-text-light-secondary dark:text-text-dark-secondary text-sm font-medium leading-normal hover:text-primary" href="#">Settings</a>
<span class="text-text-light-secondary dark:text-text-dark-secondary text-sm font-medium leading-normal">/</span>
<span class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal">Profile</span>
</div>
<!-- PageHeading -->
<div class="flex flex-wrap justify-between gap-3 mb-8">
<p class="text-text-light-primary dark:text-text-dark-primary text-3xl font-bold leading-tight tracking-tight min-w-72">Profile</p>
</div>
<!-- ProfileHeader -->
<div class="flex p-4 mb-8 bg-panel-light dark:bg-panel-dark rounded-xl border border-border-light dark:border-border-dark @container">
<div class="flex w-full flex-col gap-4 @[520px]:flex-row @[520px]:justify-between @[520px]:items-center">
<div class="flex gap-4 items-center">
<div class="bg-center bg-no-repeat aspect-square bg-cover rounded-full w-24 h-24" data-alt="User avatar with abstract background" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBABHHkxziMrLvg1Q0ZRFKpMUJWOVZRs4nVe_h-ksA6cL1Tp6DKZrPNbUR8NHOqaT45OA89vDCnIs_vRlV1aw7w7_nvATl5D8LjV0_6MjrRaOMuPvlHqaWgcdudeDGd-UJXJRY-gGCSZ7peBaHXQX2yzgXexsc5i6nY3cwehdO2CnvQ2ssN8o53sNCDD0gU6VqLd4iZdQxdwB4vOalLUA2Sy8zPXBHlDLd3v_zWVAzbEdeEwuW28g5mAi7DewKCh_NUL3ZSmWu3ZpQ");'></div>
<div class="flex flex-col justify-center">
<p class="text-text-light-primary dark:text-text-dark-primary text-xl font-bold leading-tight">Eleanor Vance</p>
<p class="text-text-light-secondary dark:text-text-dark-secondary text-base font-normal leading-normal">@eleanor.vance</p>
</div>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal hover:bg-gray-100 dark:hover:bg-gray-800 w-full max-w-[480px] @[480px]:w-auto">
<span class="truncate">Upload new picture</span>
</button>
</div>
</div>
<!-- Profile Form Section -->
<div class="bg-panel-light dark:bg-panel-dark rounded-xl border border-border-light dark:border-border-dark">
<div class="p-6 border-b border-border-light dark:border-border-dark">
<h3 class="text-text-light-primary dark:text-text-dark-primary text-lg font-semibold">Personal Information</h3>
<p class="text-text-light-secondary dark:text-text-dark-secondary text-sm">Update your personal details here.</p>
</div>
<form class="p-6 space-y-6">
<!-- TextFields: Display Name & Username -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<label class="flex flex-col">
<p class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal pb-2">Display Name</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark h-11 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 text-sm font-normal leading-normal" value="Eleanor Vance"/>
</label>
<label class="flex flex-col">
<p class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal pb-2">Username</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark h-11 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 text-sm font-normal leading-normal" value="eleanor.vance"/>
</label>
</div>
<!-- Bio Textarea -->
<div>
<label class="flex flex-col">
<p class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal pb-2">Bio</p>
<textarea class="form-textarea flex w-full min-w-0 flex-1 resize-y overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark h-24 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary p-3 text-sm font-normal leading-normal" placeholder="Tell us a little about yourself...">Lead Designer at SesVer. Passionate about creating intuitive and beautiful user experiences.</textarea>
</label>
</div>
<!-- More TextFields: Location & Website -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<label class="flex flex-col">
<p class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal pb-2">Location</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark h-11 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 text-sm font-normal leading-normal" value="San Francisco, CA"/>
</label>
<label class="flex flex-col">
<p class="text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal pb-2">Website</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-text-light-primary dark:text-text-dark-primary focus:outline-0 focus:ring-2 focus:ring-primary border-border-light dark:border-border-dark bg-background-light dark:bg-background-dark h-11 placeholder:text-text-light-secondary dark:placeholder:text-text-dark-secondary px-3 text-sm font-normal leading-normal" value="sesver.com"/>
</label>
</div>
</form>
<div class="p-6 border-t border-border-light dark:border-border-dark flex justify-end gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-background-light dark:bg-background-dark border border-border-light dark:border-border-dark text-text-light-primary dark:text-text-dark-primary text-sm font-medium leading-normal hover:bg-gray-100 dark:hover:bg-gray-800">
<span>Cancel</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-4 bg-primary text-white text-sm font-medium leading-normal hover:bg-primary/90">
<span>Save Changes</span>
</button>
</div>
</div>
</div>
</main>
</div>
</body></html>
