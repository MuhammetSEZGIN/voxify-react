<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Create Your Account - SesVer</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#007BFF",
              "background-light": "#f6f7f8",
              "background-dark": "#121826",
              "form-bg-dark": "#1D2432",
              "text-primary-dark": "#E0E0E0",
              "text-secondary-dark": "#8A94A6",
              "border-dark": "#3b4754",
              "error": "#FF4D4F"
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
</head>
<body class="font-display bg-background-light dark:bg-background-dark">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-x-hidden p-4 group/design-root">
<div class="flex w-full max-w-md flex-col items-center justify-center">
<!-- Logo -->
<div class="mb-8 text-center">
<h2 class="text-3xl font-bold text-text-primary-dark">SesVer</h2>
</div>
<!-- Form Container -->
<div class="w-full rounded-xl bg-background-light dark:bg-form-bg-dark p-8 shadow-lg">
<div class="text-center">
<h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-text-primary-dark">Create Your Account</h1>
<p class="mt-2 text-sm text-slate-600 dark:text-text-secondary-dark">Join SesVer today to start communicating.</p>
</div>
<form class="mt-8 space-y-6">
<!-- Username Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium text-slate-700 dark:text-text-secondary-dark pb-2">Username</p>
<input class="form-input flex h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 bg-white p-3 text-base font-normal leading-normal text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-[#1c2127] dark:text-text-primary-dark dark:placeholder:text-text-secondary-dark dark:focus:border-primary" placeholder="Enter your username" value=""/>
</label>
</div>
<!-- Email Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium text-slate-700 dark:text-text-secondary-dark pb-2">Email Address</p>
<input class="form-input flex h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 bg-white p-3 text-base font-normal leading-normal text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-[#1c2127] dark:text-text-primary-dark dark:placeholder:text-text-secondary-dark dark:focus:border-primary" placeholder="Enter your email address" type="email" value=""/>
</label>
</div>
<!-- Password Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium text-slate-700 dark:text-text-secondary-dark pb-2">Password</p>
<div class="relative flex w-full flex-1 items-stretch">
<input class="form-input flex h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-slate-300 bg-white p-3 pr-10 text-base font-normal leading-normal text-slate-900 placeholder:text-slate-400 focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 dark:border-border-dark dark:bg-[#1c2127] dark:text-text-primary-dark dark:placeholder:text-text-secondary-dark dark:focus:border-primary" placeholder="Create a password" type="password" value=""/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 dark:text-text-secondary-dark hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</label>
</div>
<!-- Confirm Password Field -->
<div>
<label class="flex flex-col">
<p class="text-sm font-medium text-slate-700 dark:text-text-secondary-dark pb-2">Confirm Password</p>
<div class="relative flex w-full flex-1 items-stretch">
<input class="form-input flex h-12 w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg border border-error bg-white p-3 pr-10 text-base font-normal leading-normal text-slate-900 placeholder:text-slate-400 focus:border-error focus:outline-none focus:ring-2 focus:ring-error/20 dark:border-error dark:bg-[#1c2127] dark:text-text-primary-dark dark:placeholder:text-text-secondary-dark dark:focus:border-error" placeholder="Confirm your password" type="password" value=""/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-slate-400 dark:text-text-secondary-dark hover:text-primary" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<p class="mt-2 text-xs text-error">Passwords do not match</p>
</label>
</div>
<!-- Register Button -->
<div>
<button class="flex h-12 w-full items-center justify-center rounded-lg bg-primary px-4 py-2 text-base font-semibold text-white transition-colors hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 dark:focus:ring-offset-background-dark">
                            Register
                        </button>
</div>
</form>
</div>
<!-- Secondary Link -->
<div class="mt-6 text-center">
<p class="text-sm text-slate-500 dark:text-text-secondary-dark">
                    Already have an account? 
                    <a class="font-semibold text-primary hover:underline" href="#">Log in</a>
</p>
</div>
</div>
</div>
</body></html>
